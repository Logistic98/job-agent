profiles:
  default:
    title: 智能工作台
    description: 支持开放问答、资料分析、任务规划、内容生成和流程跟进。
    placeholder: 例如：解释一个概念、生成方案、整理清单、分析材料或规划任务
    quick_prompts:
      - 帮我解释一个行业概念
      - 帮我设计一份工作计划
      - 帮我整理一份会议纪要模板
      - 帮我分析一段业务材料
      - 帮我生成一个项目推进清单
  career:
    title: 求职工作台
    description: 支持岗位推荐、简历分析、面试准备、笔试计划、项目深挖和求职进展梳理。
    placeholder: 例如：筛选岗位、分析简历、准备面试、制定笔试计划、生成项目深挖问题或记录求职进展
    profile_hint: 画像会用于岗位筛选、简历分析、面试准备和工作台问答。
    quick_prompts:
      - 帮我筛选上海 Java 后端 20-30K 岗位
      - 分析当前简历有哪些问题
      - 根据当前岗位列表生成面试准备清单
      - 帮我准备笔试计划
      - 围绕我的项目经历生成深挖问题
      - 帮我记录这家公司进入一面阶段
