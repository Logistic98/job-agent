version: observability
name: Runtime 可观测契约评估集
description: >-
  面向 agent-runtime 可观测能力的契约评估集，配套 runner 为 scripts/run_engine_eval.py。
  验证目标：LLM 路径在 run_end 前产出 llm_usage 汇总事件（调用次数、token 用量、缓存命中）；
  工具路径的 tool_execute_end 携带 duration_ms 与逐工具 results；工具失败时产出 tool_execute_failed
  事件并携带 tool 与 error 字段。评分逻辑位于 app/grader.py 的 observability 维度。

runtime_profile: job-buddy

risk_control:
  default_skip_live_boss: true
  stop_on_boss_challenge: true

cases:
  # LLM 直达合成路径：必须产出 llm_usage 事件并携带 token 汇总
  - id: obs_llm_usage_on_qa_path
    category: observability
    input: "解释一下 Java 里 HashMap 和 ConcurrentHashMap 的区别"
    expected:
      domain: open_domain
      expect_llm_usage: true
      events: [intent, message, done]
      answer_min_chars: 40
      min_score: 0.75
    latency_budget:
      ttft_ms_target: 2500
      ttft_ms_max: 5500
      done_ms_target: 8000
      done_ms_max: 14000

  # 澄清路径同样经过任务理解 LLM 调用，llm_usage 应存在
  - id: obs_llm_usage_on_clarify_path
    category: observability
    input: "帮我优化一下"
    expected:
      expect_status: paused
      needs_clarification: true
      expect_llm_usage: true
      events: [intent, message, done]
      min_score: 0.75
    latency_budget:
      ttft_ms_target: 1500
      ttft_ms_max: 3500
      done_ms_target: 3500
      done_ms_max: 7000

  # 工具路径：trace 中 tool_execute_end 需携带 duration_ms 与逐工具 results，
  # 该用例依赖真实 Boss 登录态，默认跳过，需 --allow-boss 显式执行。
  - id: obs_tool_duration_on_job_path
    category: observability
    requires_live_boss: true
    input: "在我的推荐里找 3 个 Java 后端岗位"
    expected:
      domain: job
      intent: job.recommend
      expect_llm_usage: true
      trace_events: [run_start, task_understanding, capability_route, tool_execute_start, tool_execute_end, finalize, run_end]
      events: [intent, done]
      min_score: 0.75
