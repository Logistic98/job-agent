name: quality-gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    name: harness gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MAVEN_OPTS: -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.16"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"
          cache: npm
          cache-dependency-path: agent-frontend/package-lock.json

      - name: Run quick quality gate
        run: ./.agent-harness/scripts/gate.sh all --quick
